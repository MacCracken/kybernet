[package]
name = "kybernet"
version = "1.0.0"
description = "PID 1 init system for AGNOS"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "3.9.5"

[build]
entry = "src/main.cyr"
test = "src/test.cyr"
output = "kybernet"

[deps]
stdlib = ["string", "fmt", "alloc", "io", "vec", "str", "fnptr", "tagged", "callback", "hashmap", "json", "freelist", "process", "sakshi", "sakshi_full", "sigil", "syscalls", "mmap", "bigint", "chrono", "bench", "assert"]

[deps.agnosys]
git = "https://github.com/MacCracken/agnosys"
path = "../agnosys"
tag = "0.97.2"
modules = ["lib/syscalls_linux.cyr"]

[deps.agnostik]
git = "https://github.com/MacCracken/agnostik"
path = "../agnostik"
tag = "0.97.1"
modules = ["src/types.cyr", "src/security.cyr", "src/agent.cyr", "src/error.cyr"]

[deps.argonaut]
git = "https://github.com/MacCracken/argonaut"
path = "../argonaut"
tag = "1.1.0"
modules = ["lib/libro/error.cyr", "lib/libro/entry.cyr", "lib/libro/hasher.cyr", "lib/libro/chain.cyr", "lib/libro/query.cyr", "lib/libro/verify.cyr", "lib/libro/retention.cyr", "lib/libro/export.cyr", "src/types.cyr", "src/audit.cyr", "src/services.cyr", "src/health.cyr", "src/process_mgmt.cyr", "src/boot.cyr", "src/init.cyr"]
