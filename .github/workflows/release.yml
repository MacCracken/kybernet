name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

env:
  CYRIUS_TOOLCHAIN: ".cyrius-toolchain"

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build release binary ──
  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version' cyrius.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: cyrius.toml ($TOML_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(cat .cyrius-toolchain | tr -d '[:space:]')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build x86_64 binary
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/kybernet
          echo "kybernet: $(wc -c < build/kybernet) bytes"
          cp build/kybernet kybernet-x86_64

      - name: Run tests
        run: |
          cyrius test src/test.cyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep "0 failed"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="No changelog entry for this release."
          fi
          echo "$BODY" > release-body.md

      - name: Create source archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="kybernet-${TAG}/" -o "kybernet-${TAG}-src.tar.gz" HEAD

      - name: Generate checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          sha256sum kybernet-x86_64 "kybernet-${TAG}-src.tar.gz" > SHA256SUMS
          cat SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            kybernet-x86_64
            kybernet-*-src.tar.gz
            SHA256SUMS
            release-body.md
          retention-days: 5

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "kybernet ${{ github.ref_name }}"
          body_path: release-body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            kybernet-x86_64
            kybernet-${{ github.ref_name }}-src.tar.gz
            SHA256SUMS
