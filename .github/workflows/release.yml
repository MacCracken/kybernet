name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Build release (linux-amd64)
        run: cargo build --release
        env:
          RUSTFLAGS: "-D warnings"

      - name: Build release (linux-arm64)
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: aarch64-unknown-linux-gnu
          args: --release

      - name: Package binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp target/release/kybernet "dist/kybernet-${TAG}-linux-amd64"
          cp target/aarch64-unknown-linux-gnu/release/kybernet "dist/kybernet-${TAG}-linux-arm64" 2>/dev/null || true
          cd dist && sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "kybernet ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            dist/*
