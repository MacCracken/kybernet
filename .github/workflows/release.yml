name: Release

on:
  push:
    tags: ['*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Clone Cyrius toolchain
        run: |
          git clone --depth 1 https://github.com/MacCracken/cyrius.git ../cyrius
          cd ../cyrius
          sh bootstrap/bootstrap.sh
          cat stage1/cc2.cyr | ./build/stage1f > ./build/cc2 && chmod +x ./build/cc2

      - name: Build
        run: |
          sh scripts/build.sh
          cp build/kybernet kybernet-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kybernet-x86_64
