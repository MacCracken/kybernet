name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. Version-verify enforces
    # semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives version from the
          # VERSION file — VERSION is the single source of truth. Resolve
          # the template to the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.0.0 == 1.0.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || {
            echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyml: $CYML_RAW)"

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version — no version is hardcoded in
          # this YAML. Read the pin and hand it to the upstream installer,
          # which fetches + lays out $HOME/.cyrius/{bin,lib}. Matches
          # patra / sigil / agnosys CI.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build x86_64 (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/kybernet
          echo "kybernet: $(wc -c < build/kybernet) bytes"

      - name: Cross-build aarch64 (best-effort)
        # cyrius 6.0.x renamed cc5_aarch64 → cycc_aarch64 (cc5_aarch64 kept
        # as a symlink); accept either so the guard works across toolchain ages.
        run: |
          if [ -x "$HOME/.cyrius/bin/cycc_aarch64" ] || [ -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/kybernet-aarch64
            echo "kybernet-aarch64: $(wc -c < build/kybernet-aarch64) bytes"
          else
            echo "::warning::no aarch64 backend (cycc_aarch64/cc5_aarch64) in toolchain — aarch64 binary skipped"
          fi

      - name: Test
        run: |
          cyrius test src/test.cyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep -E "^[0-9]+ passed," | grep -q "0 failed"

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="kybernet-${TAG}/" -o "kybernet-${TAG}-src.tar.gz" HEAD
          if [ -f build/kybernet ]; then
            cp build/kybernet "kybernet-${TAG}-x86_64-linux"
          fi
          if [ -f build/kybernet-aarch64 ]; then
            cp build/kybernet-aarch64 "kybernet-${TAG}-aarch64-linux"
          fi
          sha256sum kybernet-*.tar.gz kybernet-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            kybernet-*.tar.gz
            kybernet-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/body.md
          [ -s /tmp/body.md ] || echo "No changelog entry for $TAG." > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "kybernet ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            kybernet-*.tar.gz
            kybernet-*-linux
            cyrius.lock
            SHA256SUMS
