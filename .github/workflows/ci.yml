name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version — no version is hardcoded in
          # this YAML. Read the pin and hand it to the upstream installer,
          # which fetches + lays out $HOME/.cyrius/{bin,lib}. Matches
          # patra / sigil / agnosys CI.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # cyrius.lock pins agnosys/agnostik/libro/patra/argonaut hashes
        # (plus sigil/sakshi pulled in transitively by libro+patra).
        # CI fails if a resolved file's sha256 doesn't match the locked
        # entry. Skip on the first push that introduces a new dep
        # before cyrius.lock is generated and committed.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # `cyrius fmt <file>` writes the formatted source to stdout;
        # diff against the committed file catches drift. (`--check`
        # became a no-op in cyrius 5.9.x — it emits nothing and
        # exits 0 regardless, so diffing its stdout reports spurious
        # drift on every file. Matches argonaut / agnosys CI.)
        run: |
          fail=0
          for f in src/main.cyr src/test.cyr src/bench.cyr src/lib/*.cyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint (advisory)
        # Advisory-only; tighten to fail-on-warning once the
        # standing dead-code warnings are addressed.
        continue-on-error: true
        run: |
          for f in src/main.cyr src/test.cyr src/bench.cyr src/lib/*.cyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f"
          done

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/kybernet
          echo "kybernet: $(wc -c < build/kybernet) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/kybernet | grep -q "7f45 4c46"

      - name: Cross-build aarch64 (best-effort)
        # Only when the toolchain ships an aarch64 backend. cyrius 6.0.x
        # renamed cc5_aarch64 → cycc_aarch64 (cc5_aarch64 retained as a
        # symlink); accept either so the guard works across toolchain ages.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ] && [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::no aarch64 backend (cycc_aarch64/cc5_aarch64) in this Cyrius — skipping"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/kybernet-aarch64
          file build/kybernet-aarch64 | grep -q "aarch64" || {
            echo "ERROR: kybernet-aarch64 is not aarch64 ELF"; exit 1; }
          echo "kybernet-aarch64: $(wc -c < build/kybernet-aarch64) bytes"

      - name: Test
        run: |
          cyrius test src/test.cyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep -E "^[0-9]+ passed," | grep -q "0 failed"

      - name: Bench
        # Non-fatal — bench numbers vary by runner.
        continue-on-error: true
        run: cyrius bench src/bench.cyr

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/kybernet
          retention-days: 5

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        # kybernet is PID 1 — fork/execve via argonaut is intentional, but
        # raw exit/execve syscalls in lib modules are not. Scan code lines
        # only (skip comments via awk, not "grep -v '# '" which would also
        # eat lines with inline comments).
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Raw execve outside lib/process_mgmt territory (handled by argonaut).
          hits=$(grep -rn 'syscall( *59' src/lib/ 2>/dev/null || true)
          [ -n "$hits" ] && { echo "FAIL: raw execve in lib module"; echo "$hits"; FAIL=1; }
          # Direct exit(60) outside main entrypoint.
          hits=$(grep -rn 'syscall( *60' src/lib/ 2>/dev/null || true)
          [ -n "$hits" ] && { echo "FAIL: direct exit syscall in lib module"; echo "$hits"; FAIL=1; }
          scan "raw system()" '\bsystem\s*\('
          # Unbounded stack buffers (>= 64KB → require heap review).
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr src/lib/*.cyr 2>/dev/null | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          # Informational counts — fd hygiene tracking.
          OPENS=$(grep -rn 'sys_open' src/ 2>/dev/null | awk -F: '
            { line=$3; sub(/^[[:space:]]+/,"",line);
              if (substr(line,1,1) != "#") print }' | wc -l)
          CLOSES=$(grep -rn 'sys_close' src/ 2>/dev/null | awk -F: '
            { line=$3; sub(/^[[:space:]]+/,"",line);
              if (substr(line,1,1) != "#") print }' | wc -l)
          echo "sys_open: $OPENS, sys_close: $CLOSES (informational)"
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  qemu-harness:
    name: QEMU PID-1 harness (best-effort)
    runs-on: ubuntu-latest
    # KVM is mandatory, not optional: sakshi's clock_init hard-requires
    # invariant TSC (CPUID 80000007h EDX bit 8), and QEMU's TCG software
    # engine does NOT implement that bit — `+invtsc` is silently dropped
    # under TCG and the boot panics ("Attempted to kill init"). So we must
    # use real KVM. GitHub-hosted Linux runners DO expose /dev/kvm (Azure
    # nested virt) but leave it root-only; this job installs qemu, opens
    # /dev/kvm perms (the same udev rule the android-emulator-runner action
    # uses), unlocks the host kernel image, then runs the real PID-1 boot.
    # Kept continue-on-error because not every runner image guarantees KVM
    # — flip it off to make the harness a hard PR gate once reliably green.
    continue-on-error: true
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 cpio
          # /dev/kvm exists on hosted runners but is root:kvm 0660 and the
          # runner user isn't in the kvm group. Make the node world-RW.
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules || true
          sudo udevadm trigger --name-match=kvm || true

      - name: Check prerequisites
        id: prereqs
        run: |
          missing=""
          [ -r /dev/kvm ] || missing="$missing /dev/kvm(no-nested-virt)"
          command -v qemu-system-x86_64 >/dev/null 2>&1 || missing="$missing qemu-system-x86_64"
          KERNEL=""
          for cand in /boot/vmlinuz-linux-lts /boot/vmlinuz-linux /boot/vmlinuz-$(uname -r) /boot/vmlinuz; do
            [ -f "$cand" ] && KERNEL="$cand" && break
          done
          if [ -n "$KERNEL" ]; then
            # Distro kernels are mode 0600 root — make readable so qemu
            # (running as the unprivileged runner user) can load it.
            sudo chmod +r "$KERNEL" || true
            [ -r "$KERNEL" ] || missing="$missing kernel-unreadable"
          else
            missing="$missing kernel-image"
          fi
          if [ -n "$missing" ]; then
            echo "::warning::QEMU harness skipped — missing:$missing"
            echo "skip=1" >> $GITHUB_OUTPUT
          else
            echo "Using kernel: $KERNEL"
            echo "kernel=$KERNEL" >> $GITHUB_OUTPUT
            echo "skip=0" >> $GITHUB_OUTPUT
          fi

      - name: Install Cyrius toolchain
        if: steps.prereqs.outputs.skip == '0'
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps + build kybernet
        if: steps.prereqs.outputs.skip == '0'
        run: |
          cyrius deps
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/kybernet

      - name: Run harness
        if: steps.prereqs.outputs.skip == '0'
        env:
          # Nested KVM on Azure is slower than dev iron (local KVM boots in
          # ~0.8s); 8s budget + 60s qemu timeout buy generous headroom.
          BUDGET_MS: 8000
        run: |
          bash qemu/boot-test.sh "${{ steps.prereqs.outputs.kernel }}" 60

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md \
                   LICENSE CLAUDE.md cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        # cyrius.cyml pulls package.version from VERSION via ${file:VERSION};
        # just check VERSION appears in CHANGELOG.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
